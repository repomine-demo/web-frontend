<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — ShopStack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; color: #212529; }

    nav { background: #1a1a2e; color: white; padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    nav .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; text-decoration: none; color: white; }
    nav .logo span { color: #6c63ff; }
    nav .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    nav a.nav-link { color: #a0aec0; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.15s; }
    nav a.nav-link:hover { color: white; }
    nav .cart-btn { background: #6c63ff; border: none; color: white; padding: 0.5rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; transition: background 0.2s; }
    nav .cart-btn:hover { background: #5a52d5; }
    nav .cart-count { background: #ff4757; color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }

    /* Breadcrumb */
    .breadcrumb { max-width: 1100px; margin: 1.5rem auto; padding: 0 2rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #adb5bd; }
    .breadcrumb a { color: #6c63ff; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .sep { color: #dee2e6; }

    /* Product layout */
    .product-page { max-width: 1100px; margin: 0 auto 4rem; padding: 0 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }

    /* Image panel — calls catalog-service: GET /api/catalog/products/:id */
    .image-panel { background: white; border-radius: 16px; padding: 3rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .product-emoji { font-size: 10rem; line-height: 1; filter: drop-shadow(0 12px 24px rgba(0,0,0,0.1)); }
    .badge-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .badge { padding: 4px 12px; border-radius: 4px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; }
    .badge.sale { background: #ff4757; color: white; }
    .badge.new { background: #2ed573; color: white; }
    .badge.hot { background: #ffa502; color: white; }

    /* Inventory panel — calls catalog-service: GET /api/catalog/inventory/:sku */
    .inventory-strip { width: 100%; display: flex; justify-content: center; gap: 2rem; padding: 1rem; background: #f8f9fa; border-radius: 10px; }
    .inv-item { text-align: center; }
    .inv-item .inv-num { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; }
    .inv-item .inv-label { font-size: 0.72rem; color: #adb5bd; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Info panel */
    .info-panel { display: flex; flex-direction: column; gap: 1.25rem; }
    .product-sku { font-size: 0.72rem; color: #adb5bd; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; }
    .product-name { font-size: 2rem; font-weight: 800; color: #1a1a2e; line-height: 1.2; }
    .stars-row { display: flex; align-items: center; gap: 0.6rem; }
    .stars { color: #ffc107; font-size: 1.1rem; letter-spacing: 2px; }
    .rating-num { font-weight: 700; font-size: 0.9rem; color: #495057; }
    .review-count { font-size: 0.82rem; color: #adb5bd; }
    .price-row { display: flex; align-items: baseline; gap: 1rem; }
    .price { font-size: 2.6rem; font-weight: 900; color: #1a1a2e; }
    .price-orig { font-size: 1.1rem; color: #adb5bd; text-decoration: line-through; }
    .price-save { font-size: 0.85rem; background: #fff3cd; color: #856404; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
    .product-desc { font-size: 0.95rem; color: #495057; line-height: 1.7; }
    hr.divider { border: none; border-top: 1px solid #f1f3f5; }
    .meta-grid { display: flex; flex-direction: column; gap: 0.5rem; }
    .meta-row { display: flex; gap: 0.75rem; font-size: 0.85rem; }
    .meta-label { color: #adb5bd; font-weight: 600; min-width: 80px; }
    .meta-value { color: #495057; font-weight: 500; }
    .in-stock { color: #20bf6b; font-weight: 700; }
    .low-stock { color: #ffa502; font-weight: 700; }
    .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .tag { background: #f1f3f5; color: #6c757d; font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }

    /* Add to cart — calls payments-service: POST /api/payments/charge */
    .purchase-box { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; flex-direction: column; gap: 1rem; }
    .qty-row { display: flex; align-items: center; gap: 1rem; }
    .qty-label { font-size: 0.85rem; font-weight: 600; color: #495057; }
    .qty-ctrl { display: flex; align-items: center; border: 2px solid #e9ecef; border-radius: 8px; overflow: hidden; }
    .qty-ctrl button { background: #f8f9fa; border: none; width: 38px; height: 38px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .qty-ctrl button:hover { background: #e9ecef; }
    .qty-ctrl span { min-width: 48px; text-align: center; font-size: 1rem; font-weight: 700; border-left: 2px solid #e9ecef; border-right: 2px solid #e9ecef; height: 38px; line-height: 38px; }
    .add-to-cart-btn { background: #6c63ff; border: none; color: white; padding: 0.9rem 1.5rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; transition: background 0.2s; }
    .add-to-cart-btn:hover { background: #5a52d5; }
    .add-to-cart-btn:active { transform: scale(0.98); }
    .wishlist-btn { background: white; border: 2px solid #e9ecef; color: #495057; padding: 0.9rem; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: all 0.15s; }
    .wishlist-btn:hover { border-color: #6c63ff; color: #6c63ff; }
    .btn-row { display: flex; gap: 0.75rem; }
    .service-hint { font-size: 0.72rem; color: #adb5bd; text-align: center; }

    /* Specs / delivery */
    .product-bottom { max-width: 1100px; margin: 0 auto 4rem; padding: 0 2rem; display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    .specs-card, .delivery-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .card-title { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1rem; }
    .specs-table { width: 100%; border-collapse: collapse; }
    .specs-table tr { border-bottom: 1px solid #f1f3f5; }
    .specs-table tr:last-child { border-bottom: none; }
    .specs-table td { padding: 0.6rem 0; font-size: 0.85rem; }
    .specs-table td:first-child { color: #adb5bd; font-weight: 600; width: 40%; }
    .specs-table td:last-child { color: #495057; }
    .delivery-items { display: flex; flex-direction: column; gap: 0.9rem; }
    .delivery-item { display: flex; align-items: flex-start; gap: 0.75rem; }
    .delivery-icon { font-size: 1.3rem; }
    .delivery-text strong { display: block; font-size: 0.85rem; color: #1a1a2e; margin-bottom: 0.1rem; }
    .delivery-text span { font-size: 0.78rem; color: #adb5bd; }

    /* Related — calls catalog-service: GET /api/catalog/products?category=:cat */
    .related-section { max-width: 1100px; margin: 0 auto 4rem; padding: 0 2rem; }
    .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.25rem; color: #1a1a2e; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem; }
    .related-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; color: inherit; display: block; }
    .related-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .related-img { background: #f1f3f5; height: 140px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
    .related-info { padding: 0.85rem; }
    .related-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.3rem; line-height: 1.3; }
    .related-price { font-size: 1rem; font-weight: 800; color: #6c63ff; }

    /* Toast */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #1a1a2e; color: white; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; z-index: 300; transition: transform 0.3s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 760px) {
      .product-page { grid-template-columns: 1fr; gap: 1.5rem; }
      .product-emoji { font-size: 7rem; }
      .product-name { font-size: 1.6rem; }
      .price { font-size: 2rem; }
      .product-bottom { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Shop<span>Stack</span></a>
  <div class="nav-right">
    <a class="nav-link" href="search.html">🔍 Search</a>
    <a class="nav-link" href="index.html">Home</a>
    <button class="cart-btn" onclick="openCart()">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a>
  <span class="sep">›</span>
  <span id="breadcrumbCat">Products</span>
  <span class="sep">›</span>
  <span id="breadcrumbName">Loading…</span>
</div>

<div class="product-page" id="productPage">
  <!-- populated by JS — fetches from catalog-service + inventory -->
  <div style="grid-column:1/-1;text-align:center;padding:4rem;color:#adb5bd;">Loading product…</div>
</div>

<div class="product-bottom" id="productBottom" style="display:none"></div>

<div class="related-section" id="relatedSection" style="display:none">
  <div class="section-title">Related Products</div>
  <div class="related-grid" id="relatedGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Shared product catalogue (mirrors index.html — in prod this comes from catalog-service) ─
// Service call: GET /api/catalog/products/:id  →  catalog-service
// Service call: GET /api/catalog/inventory/:sku →  catalog-service (inventory endpoint)
const PRODUCTS = [
  { id:1,  sku:"SHIRT-BLU-M",   name:"Classic Blue Oxford Shirt",       desc:"Premium cotton, tailored fit. Perfect for any occasion. Machine washable, wrinkle-resistant fabric that keeps you looking sharp from morning meetings to after-work events.",  price:49.99,  emoji:"👕", category:"apparel",     badge:"",    rating:4.6, reviews:124, stock:47, tags:["cotton","slim-fit","business-casual"], specs:{Material:"100% Cotton",Fit:"Slim Fit",Care:"Machine wash cold",Origin:"Portugal"} },
  { id:2,  sku:"LAPTOP-PRO-15", name:"ProBook Laptop 15\"",              desc:"Intel i7 12th Gen, 16GB DDR5 RAM, 512GB NVMe SSD. Built for developers who refuse to compromise. Ships with 24-month warranty and priority support.",  price:1299.00,emoji:"💻", category:"electronics", badge:"SALE",rating:4.8, reviews:312, stock:8,  tags:["laptop","developer","intel","ssd"],     specs:{CPU:"Intel i7-1260P",RAM:"16GB DDR5",Storage:"512GB NVMe",Display:"15.6\" FHD IPS",Battery:"72Wh",OS:"Windows 11 Pro"} },
  { id:3,  sku:"MUG-BLK-350",   name:"Matte Black Coffee Mug",          desc:"350ml ceramic mug with a smooth matte finish. Dishwasher and microwave safe. The perfect companion for your morning ritual — holds heat 40% longer than standard mugs.",  price:14.99, emoji:"☕", category:"home",        badge:"",    rating:4.9, reviews:876, stock:203,tags:["ceramic","mug","kitchen","gift"],        specs:{Capacity:"350ml",Material:"Ceramic",Finish:"Matte",Dishwasher:"Yes",Microwave:"Yes"} },
  { id:4,  sku:"SNKR-WHT-42",   name:"Urban Runner Sneakers",           desc:"Lightweight engineered mesh upper, responsive EVA midsole, durable rubber outsole. Sizes 36–47. Available in White, Black, and Slate Grey.",  price:89.99, emoji:"👟", category:"apparel",     badge:"",    rating:4.5, reviews:201, stock:34, tags:["sneakers","running","lightweight"],       specs:{Upper:"Mesh",Sole:"EVA + Rubber",Sizes:"EU 36–47",Weight:"280g (per shoe)",Closure:"Lace-up"} },
  { id:5,  sku:"HEADPH-NC-700", name:"Studio Noise-Cancel Headphones",  desc:"40-hour battery life, active noise cancellation, foldable design with carrying case. Premium sound profile tuned by audio engineers. USB-C fast charge — 10 min = 3 hours.",  price:249.99,emoji:"🎧", category:"electronics", badge:"HOT", rating:4.7, reviews:543, stock:22, tags:["audio","anc","wireless","studio"],        specs:{Battery:"40 hours",ANC:"Yes, adaptive",Driver:"40mm",Connectivity:"Bluetooth 5.3",Charging:"USB-C",Foldable:"Yes"} },
  { id:6,  sku:"YOGA-MAT-6MM",  name:"Pro Yoga Mat 6mm",                desc:"Non-slip textured surface, eco-friendly closed-cell TPE foam. 183cm × 61cm. Includes carrying strap. Free from latex, PVC, and harmful chemicals.",  price:39.99, emoji:"🧘", category:"sports",      badge:"",    rating:4.6, reviews:88,  stock:65, tags:["yoga","fitness","eco","non-slip"],        specs:{Material:"TPE",Thickness:"6mm",Size:"183 × 61cm",Weight:"1.1kg",Includes:"Carrying strap"} },
  { id:7,  sku:"BOOK-CLEANCODE",name:"Clean Code",                      desc:"Robert C. Martin's definitive guide to writing clean, readable, and maintainable code. Essential reading for every software engineer who cares about craft.",  price:34.99, emoji:"📗", category:"books",       badge:"",    rating:4.8, reviews:1204,stock:99, tags:["programming","software","best-seller"],  specs:{Author:"Robert C. Martin",Publisher:"Prentice Hall",Pages:"431",Format:"Paperback",Language:"English"} },
  { id:8,  sku:"PLANT-MONSTERA",name:"Monstera Deliciosa",              desc:"Healthy 60cm Monstera plant in a handcrafted ceramic pot. Ships same day with plant care guide and 30-day health guarantee. Low maintenance, high impact.",  price:59.99, emoji:"🌿", category:"home",        badge:"NEW", rating:4.7, reviews:67,  stock:15, tags:["plant","home-decor","gift","monstera"],  specs:{Height:"~60cm",Pot:"14cm ceramic",Light:"Indirect bright",Water:"Weekly",Pet:"Non-toxic"} },
  { id:9,  sku:"WATERBOTTLE-1L",name:"Insulated Water Bottle 1L",       desc:"Double-wall vacuum insulation keeps cold 24h, hot 12h. BPA-free 18/8 stainless steel, powder-coat finish, leak-proof lid. Fits most cup holders.",  price:29.99, emoji:"🍶", category:"sports",      badge:"",    rating:4.7, reviews:445, stock:120,tags:["bottle","hydration","stainless","gym"],   specs:{Capacity:"1 litre",Material:"18/8 Stainless",Insulation:"Double-wall vacuum",Cold:"24 hours",Hot:"12 hours",BPA:"Free"} },
  { id:10, sku:"KEYBOARD-MECH", name:"Mechanical Keyboard TKL",        desc:"Tenkeyless layout with Cherry MX Red linear switches. Per-key RGB, braided USB-C cable, aluminium faceplate. N-key rollover. Ships with keycap puller and spare switches.",  price:129.99,emoji:"⌨️", category:"electronics", badge:"",    rating:4.6, reviews:178, stock:41, tags:["keyboard","mechanical","rgb","gaming"],   specs:{Layout:"TKL (87-key)",Switch:"Cherry MX Red",Backlight:"Per-key RGB",Cable:"USB-C braided 1.8m",Rollover:"N-key"} },
  { id:11, sku:"CANDLE-LAVNDR", name:"Lavender Soy Candle",             desc:"Hand-poured natural soy wax with pure lavender essential oil. 60-hour burn time, natural cotton wick, amber glass jar. Ethically sourced, vegan, phthalate-free.",  price:22.99, emoji:"🕯️", category:"home",        badge:"",    rating:4.9, reviews:312, stock:88, tags:["candle","home","lavender","vegan"],       specs:{Wax:"100% Soy",Fragrance:"Pure Lavender EO","Burn Time":"60 hours",Wick:"Cotton",Jar:"Amber glass",Vegan:"Yes"} },
  { id:12, sku:"BOOK-DDIA",     name:"Designing Data-Intensive Apps",   desc:"Martin Kleppmann's comprehensive guide to the principles, algorithms, and trade-offs of modern data systems. The definitive book for engineers building at scale.",  price:54.99, emoji:"📘", category:"books",       badge:"HOT", rating:4.9, reviews:2100,stock:76, tags:["distributed-systems","databases","best-seller"],specs:{Author:"Martin Kleppmann",Publisher:"O'Reilly",Pages:"590",Format:"Paperback",Language:"English"} },
];

const CATEGORY_LABELS = { apparel:"Apparel", electronics:"Electronics", home:"Home & Living", sports:"Sports", books:"Books" };

// ── Cart (persisted in sessionStorage across pages) ─────────────────────────
let cart = JSON.parse(sessionStorage.getItem("ss_cart") || "[]");
let pdpQty = 1;

function saveCart() { sessionStorage.setItem("ss_cart", JSON.stringify(cart)); }
function renderCartCount() {
  document.getElementById("cartCount").textContent = cart.reduce((s, i) => s + i.qty, 0);
}

// ── Load product from "catalog-service" ─────────────────────────────────────
function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get("id"));
  // Simulates: GET /api/catalog/products/:id  (catalog-service)
  const product = PRODUCTS.find(p => p.id === id);
  if (!product) {
    document.getElementById("productPage").innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:#adb5bd;"><div style="font-size:3rem;margin-bottom:1rem;">😕</div><p>Product not found. <a href="index.html" style="color:#6c63ff;">Back to store</a></p></div>`;
    return;
  }

  document.title = `${product.name} — ShopStack`;
  document.getElementById("breadcrumbCat").textContent = CATEGORY_LABELS[product.category] || product.category;
  document.getElementById("breadcrumbName").textContent = product.name;

  // Simulates: GET /api/catalog/inventory/:sku  (catalog-service inventory endpoint)
  const inventory = { available: product.stock, reserved: Math.floor(product.stock * 0.1), warehouse: "EU-WEST-1" };
  const stockLabel = inventory.available > 20 ? `<span class="in-stock">● In Stock (${inventory.available} units)</span>`
                   : inventory.available > 0   ? `<span class="low-stock">⚠ Low Stock — only ${inventory.available} left</span>`
                   : `<span style="color:#ff4757;font-weight:700;">Out of Stock</span>`;

  const hasDiscount = product.badge === "SALE";
  const origPrice = hasDiscount ? (product.price * 1.2).toFixed(2) : null;
  const savings = hasDiscount ? (product.price * 0.2).toFixed(2) : null;
  const stars = "★".repeat(Math.round(product.rating)) + "☆".repeat(5 - Math.round(product.rating));

  document.getElementById("productPage").innerHTML = `
    <div class="image-panel">
      <div class="product-emoji">${product.emoji}</div>
      <div class="badge-row">
        ${product.badge === "SALE" ? '<span class="badge sale">SALE</span>' : ""}
        ${product.badge === "HOT"  ? '<span class="badge hot">HOT</span>'   : ""}
        ${product.badge === "NEW"  ? '<span class="badge new">NEW</span>'   : ""}
      </div>
      <div class="inventory-strip">
        <div class="inv-item"><div class="inv-num">${inventory.available}</div><div class="inv-label">Available</div></div>
        <div class="inv-item"><div class="inv-num">${inventory.reserved}</div><div class="inv-label">Reserved</div></div>
        <div class="inv-item"><div class="inv-num">${inventory.warehouse}</div><div class="inv-label">Warehouse</div></div>
      </div>
    </div>

    <div class="info-panel">
      <div class="product-sku">SKU: ${product.sku}</div>
      <div class="product-name">${product.name}</div>
      <div class="stars-row">
        <span class="stars">${stars}</span>
        <span class="rating-num">${product.rating}</span>
        <span class="review-count">(${product.reviews.toLocaleString()} reviews)</span>
      </div>
      <div class="price-row">
        <div class="price">$${product.price.toFixed(2)}</div>
        ${origPrice ? `<div class="price-orig">$${origPrice}</div>` : ""}
        ${savings ? `<div class="price-save">Save $${savings}</div>` : ""}
      </div>
      <p class="product-desc">${product.desc}</p>
      <hr class="divider" />
      <div class="meta-grid">
        <div class="meta-row"><span class="meta-label">Category</span><span class="meta-value">${CATEGORY_LABELS[product.category]}</span></div>
        <div class="meta-row"><span class="meta-label">Stock</span><span class="meta-value">${stockLabel}</span></div>
        <div class="meta-row"><span class="meta-label">Tags</span><span class="meta-value"><div class="tags">${product.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div></span></div>
      </div>
      <hr class="divider" />
      <!-- Purchase box — checkout calls payments-service: POST /api/payments/charge -->
      <div class="purchase-box">
        <div class="qty-row">
          <span class="qty-label">Qty</span>
          <div class="qty-ctrl">
            <button onclick="changeQty(-1)">−</button>
            <span id="pdpQty">1</span>
            <button onclick="changeQty(1)">+</button>
          </div>
          <span style="font-size:0.82rem;color:#adb5bd;">$${product.price.toFixed(2)} each</span>
        </div>
        <div class="btn-row">
          <button class="add-to-cart-btn" onclick="addToCart(${product.id})" style="flex:1">Add to Cart</button>
          <button class="wishlist-btn" onclick="showToast('💜 Saved to wishlist')">♡</button>
        </div>
        <div class="service-hint">Checkout securely via payments-service · 30-day returns</div>
      </div>
    </div>
  `;

  renderSpecs(product);
  renderRelated(product);
  renderCartCount();
}

function renderSpecs(product) {
  const bottom = document.getElementById("productBottom");
  const specRows = Object.entries(product.specs).map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");
  bottom.innerHTML = `
    <div class="specs-card">
      <div class="card-title">Specifications</div>
      <table class="specs-table">${specRows}</table>
    </div>
    <div class="delivery-card">
      <div class="card-title">Delivery & Returns</div>
      <div class="delivery-items">
        <div class="delivery-item"><span class="delivery-icon">🚀</span><div class="delivery-text"><strong>Express delivery</strong><span>Order before 2pm — arrives tomorrow</span></div></div>
        <div class="delivery-item"><span class="delivery-icon">🏪</span><div class="delivery-text"><strong>Click & Collect</strong><span>Ready in 2 hours at 120+ stores</span></div></div>
        <div class="delivery-item"><span class="delivery-icon">↩️</span><div class="delivery-text"><strong>30-day returns</strong><span>Free returns, no questions asked</span></div></div>
        <div class="delivery-item"><span class="delivery-icon">🔒</span><div class="delivery-text"><strong>Secure checkout</strong><span>Payments via Stripe — PCI DSS Level 1</span></div></div>
      </div>
    </div>
  `;
  bottom.style.display = "grid";
}

// Simulates: GET /api/catalog/products?category=:cat  (catalog-service)
function renderRelated(product) {
  const related = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
  if (!related.length) return;
  const section = document.getElementById("relatedSection");
  document.getElementById("relatedGrid").innerHTML = related.map(p => `
    <a class="related-card" href="product.html?id=${p.id}">
      <div class="related-img">${p.emoji}</div>
      <div class="related-info">
        <div class="related-name">${p.name}</div>
        <div class="related-price">$${p.price.toFixed(2)}</div>
      </div>
    </a>
  `).join("");
  section.style.display = "block";
}

// ── Cart actions ─────────────────────────────────────────────────────────────
function changeQty(delta) {
  pdpQty = Math.max(1, pdpQty + delta);
  document.getElementById("pdpQty").textContent = pdpQty;
}

function addToCart(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  const existing = cart.find(i => i.product.id === productId);
  if (existing) { existing.qty += pdpQty; } else { cart.push({ product, qty: pdpQty }); }
  saveCart();
  renderCartCount();
  showToast(`${product.emoji} ${pdpQty > 1 ? pdpQty + "× " : ""}${product.name} added to cart`);
}

function openCart() { window.location = "index.html#cart"; }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

loadProduct();
</script>
